<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KES Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#2563eb;--primary-dark:#1e40af;--primary-bg:#eff6ff;--bg:#f8fafc;--card:#fff;--text:#0f172a;--text-muted:#64748b;--border:#e2e8f0;--success:#059669;--danger:#dc2626;--warning:#d97706;--radius:14px;--radius-sm:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.top-bar{background:#fff;border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.top-bar h1{font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:8px}
.top-bar-actions{display:flex;gap:8px}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:5px 10px;font-size:.75rem}
.container{max-width:1200px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:12px 20px;background:none;border:none;font-size:.9rem;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;font-family:inherit}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab:hover{color:var(--primary)}
.panel{display:none}
.panel.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-value{font-size:1.8rem;font-weight:800;color:var(--primary)}
.stat-label{font-size:.75rem;color:var(--text-muted);font-weight:600;margin-top:4px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h2{font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.82rem;font-weight:600;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.88rem;font-family:inherit;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.notice-item{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:all .15s}
.notice-item:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.notice-item.pinned{border-left:3px solid var(--warning);background:linear-gradient(135deg,#fff,rgba(217,119,6,.03))}
.notice-item.hidden{opacity:.5;border-left:3px solid var(--danger)}
.notice-content{flex:1;min-width:0}
.notice-title{font-size:.9rem;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notice-meta{font-size:.75rem;color:var(--text-muted);display:flex;gap:10px;flex-wrap:wrap}
.notice-actions{display:flex;gap:6px;flex-shrink:0}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.65rem;font-weight:700;text-transform:uppercase}
.badge-pinned{background:rgba(217,119,6,.1);color:var(--warning)}
.badge-hidden{background:rgba(220,38,38,.1);color:var(--danger)}
.badge-custom{background:rgba(37,99,235,.1);color:var(--primary)}
.empty{text-align:center;padding:40px;color:var(--text-muted)}
.loading{text-align:center;padding:20px;color:var(--text-muted)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:50px;font-size:.85rem;font-weight:500;z-index:9999;animation:toastIn .2s}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.search-box{margin-bottom:16px}
.search-box input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.9rem}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:#fff;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--text-muted)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.notice-item{flex-direction:column;align-items:flex-start}.notice-actions{width:100%;justify-content:flex-end}}
</style>
</head>
<body>

<div class="top-bar">
  <h1>🛡️ KES Admin Panel</h1>
  <div class="top-bar-actions">
    <button class="btn btn-outline" onclick="location.href='index.html'">← Back to Site</button>
  </div>
</div>

<div class="container">
  
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-scraped">0</div>
      <div class="stat-label">Scraped Notices</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-custom">0</div>
      <div class="stat-label">Custom Notices</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-pinned">0</div>
      <div class="stat-label">Pinned</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-hidden">0</div>
      <div class="stat-label">Hidden</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('scraped')">🌐 Scraped Notices</button>
    <button class="tab" onclick="switchTab('custom')">⭐ Custom Notices</button>
    <button class="tab" onclick="switchTab('add')">➕ Add New</button>
  </div>

  <!-- SCRAPED NOTICES PANEL -->
  <div class="panel active" id="panel-scraped">
    <div class="card">
      <h2>🌐 Scraped Notices from KES Website</h2>
      <div class="search-box">
        <input type="text" id="scraped-search" placeholder="🔍 Search scraped notices..." oninput="renderScraped()">
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setScrapedFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setScrapedFilter('pinned',this)">📌 Pinned</button>
        <button class="filter-btn" onclick="setScrapedFilter('hidden',this)">🙈 Hidden</button>
        <button class="filter-btn" onclick="setScrapedFilter('normal',this)">📋 Normal</button>
      </div>
      <div id="scraped-list"><div class="loading">Loading scraped notices...</div></div>
      <button class="btn btn-primary" onclick="refreshScraped()" style="margin-top:12px">🔄 Refresh from KES Website</button>
    </div>
  </div>

  <!-- CUSTOM NOTICES PANEL -->
  <div class="panel" id="panel-custom">
    <div class="card">
      <h2>⭐ Custom Notices (Admin Added)</h2>
      <div class="search-box">
        <input type="text" id="custom-search" placeholder="🔍 Search custom notices..." oninput="renderCustom()">
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setCustomFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setCustomFilter('degree',this)">🎓 Degree</button>
        <button class="filter-btn" onclick="setCustomFilter('junior',this)">🏫 Junior</button>
        <button class="filter-btn" onclick="setCustomFilter('both',this)">🎓 Both</button>
      </div>
      <div id="custom-list"><div class="loading">Loading custom notices...</div></div>
    </div>
  </div>

  <!-- ADD NEW PANEL -->
  <div class="panel" id="panel-add">
    <div class="card">
      <h2>➕ Add New Custom Notice</h2>
      <form onsubmit="addCustomNotice(event)">
        <div class="form-grid">
          <div class="form-group">
            <label>Notice Title *</label>
            <input type="text" id="add-title" required placeholder="e.g. Exam Timetable Released">
          </div>
          <div class="form-group">
            <label>Category *</label>
            <select id="add-category" required>
              <option value="general">📢 General</option>
              <option value="admission">🎓 Admission</option>
              <option value="exam">📝 Exam</option>
              <option value="result">🏆 Result</option>
              <option value="event">📅 Event</option>
              <option value="fees">💰 Fees</option>
              <option value="holiday">🎉 Holiday</option>
              <option value="announcement">📣 Announcement</option>
            </select>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>College Type *</label>
            <select id="add-college" required>
              <option value="degree">🎓 Degree College</option>
              <option value="junior">🏫 Junior College</option>
              <option value="both">🎓 Both Colleges</option>
            </select>
          </div>
          <div class="form-group">
            <label>Link (Optional)</label>
            <input type="url" id="add-link" placeholder="https://...">
          </div>
        </div>
        <div class="form-group">
          <label>Description (Optional)</label>
          <textarea id="add-desc" rows="3" placeholder="Short description..."></textarea>
        </div>
        <div class="form-group">
          <label>Image URL (Optional)</label>
          <input type="url" id="add-image" placeholder="https://...">
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="add-pinned" style="width:auto"> 📌 Pin this notice (show at top)
          </label>
        </div>
        <button type="submit" class="btn btn-success" style="width:100%;padding:12px">✅ Add Notice</button>
      </form>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://jbyctjddlbyddzavmczg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpieWN0amRkbGJ5ZGR6YXZtY3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzE2NzYsImV4cCI6MjA5Nzk0NzY3Nn0.klEa0-zSGbHZYA-fYiHYg4ceoL1PQ87gowGEbvVmhqU';
const KES_URL = 'https://kessc.edu.in/notices/';
const PROXIES = ['https://corsproxy.io/?','https://api.allorigins.win/get?url=','https://api.codetabs.com/v1/proxy?quest='];

let scrapedNotices = [];
let customNotices = [];
let scrapedFilter = 'all';
let customFilter = 'all';

// ═══════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ═══════════════════════════════════════════════════════
// SCRAPED NOTICES MANAGEMENT
// ═══════════════════════════════════════════════════════
function getScrapedConfig() {
  return JSON.parse(localStorage.getItem('kes_scraped_config') || '{"pinned":[],"hidden":[]}');
}

function saveScrapedConfig(config) {
  localStorage.setItem('kes_scraped_config', JSON.stringify(config));
}

async function refreshScraped() {
  document.getElementById('scraped-list').innerHTML = '<div class="loading">🔄 Fetching from KES website...</div>';
  
  for (const proxy of PROXIES) {
    try {
      let html;
      if (proxy.includes('allorigins')) {
        const res = await fetch(proxy + encodeURIComponent(KES_URL));
        if (!res.ok) continue;
        html = (await res.json()).contents;
      } else {
        const res = await fetch(proxy + encodeURIComponent(KES_URL));
        if (!res.ok) continue;
        html = await res.text();
      }
      if (!html) continue;

      const regex = /<li class="wp-block-post[^>]*>[\s\S]*?<a href="([^"]+)"[^>]*>([\s\S]*?)<\/a>/g;
      let match;
      scrapedNotices = [];
      
      while ((match = regex.exec(html)) !== null) {
        const href = match[1];
        const title = match[2].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
        if (title && title.toLowerCase() !== 'notices' && title.length > 5) {
          scrapedNotices.push({ title, href, id: btoa(title).substring(0, 20) });
        }
        if (scrapedNotices.length >= 20) break;
      }
      
      renderScraped();
      updateStats();
      showToast('✅ Scraped ' + scrapedNotices.length + ' notices');
      return;
    } catch (e) {
      console.warn('Proxy failed:', proxy);
      continue;
    }
  }
  
  document.getElementById('scraped-list').innerHTML = '<div class="empty">❌ Failed to fetch. Try again.</div>';
}

function setScrapedFilter(filter, btn) {
  scrapedFilter = filter;
  document.querySelectorAll('#panel-scraped .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderScraped();
}

function renderScraped() {
  const config = getScrapedConfig();
  const search = document.getElementById('scraped-search').value.toLowerCase();
  
  let filtered = scrapedNotices.filter(n => {
    if (search && !n.title.toLowerCase().includes(search)) return false;
    if (scrapedFilter === 'pinned') return config.pinned.includes(n.id);
    if (scrapedFilter === 'hidden') return config.hidden.includes(n.id);
    if (scrapedFilter === 'normal') return !config.pinned.includes(n.id) && !config.hidden.includes(n.id);
    return true;
  });

  if (filtered.length === 0) {
    document.getElementById('scraped-list').innerHTML = '<div class="empty">No notices found</div>';
    return;
  }

  document.getElementById('scraped-list').innerHTML = filtered.map(n => {
    const isPinned = config.pinned.includes(n.id);
    const isHidden = config.hidden.includes(n.id);
    const classes = ['notice-item'];
    if (isPinned) classes.push('pinned');
    if (isHidden) classes.push('hidden');

    return `
      <div class="${classes.join(' ')}">
        <div class="notice-content">
          <div class="notice-title">${n.title}</div>
          <div class="notice-meta">
            ${isPinned ? '<span class="badge badge-pinned">📌 Pinned</span>' : ''}
            ${isHidden ? '<span class="badge badge-hidden">🙈 Hidden</span>' : ''}
            <a href="${n.href}" target="_blank" style="color:var(--primary);text-decoration:none">View Original →</a>
          </div>
        </div>
        <div class="notice-actions">
          <button class="btn btn-sm ${isPinned ? 'btn-warning' : 'btn-outline'}" onclick="togglePin('${n.id}')">
            ${isPinned ? '📌 Unpin' : '📌 Pin'}
          </button>
          <button class="btn btn-sm ${isHidden ? 'btn-danger' : 'btn-outline'}" onclick="toggleHide('${n.id}')">
            ${isHidden ? '👁️ Show' : '🙈 Hide'}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function togglePin(id) {
  const config = getScrapedConfig();
  const idx = config.pinned.indexOf(id);
  if (idx === -1) {
    config.pinned.push(id);
    showToast('📌 Pinned!');
  } else {
    config.pinned.splice(idx, 1);
    showToast('📌 Unpinned');
  }
  saveScrapedConfig(config);
  renderScraped();
  updateStats();
}

function toggleHide(id) {
  const config = getScrapedConfig();
  const idx = config.hidden.indexOf(id);
  if (idx === -1) {
    config.hidden.push(id);
    showToast('🙈 Hidden!');
  } else {
    config.hidden.splice(idx, 1);
    showToast('👁️ Shown');
  }
  saveScrapedConfig(config);
  renderScraped();
  updateStats();
}

// ═══════════════════════════════════════════════════════
// CUSTOM NOTICES MANAGEMENT
// ═══════════════════════════════════════════════════════
async function loadCustomNotices() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/notices?deleted_at=is.null&order=created_at.desc`, {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
    });
    if (!r.ok) throw new Error('Load failed');
    customNotices = await r.json();
    renderCustom();
    updateStats();
  } catch (e) {
    console.error('Failed to load custom notices:', e);
    document.getElementById('custom-list').innerHTML = '<div class="empty">❌ Failed to load</div>';
  }
}

function setCustomFilter(filter, btn) {
  customFilter = filter;
  document.querySelectorAll('#panel-custom .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCustom();
}

function renderCustom() {
  const search = document.getElementById('custom-search').value.toLowerCase();
  
  let filtered = customNotices.filter(n => {
    if (search && !n.title.toLowerCase().includes(search)) return false;
    if (customFilter !== 'all' && n.college_type !== customFilter) return false;
    return true;
  });

  if (filtered.length === 0) {
    document.getElementById('custom-list').innerHTML = '<div class="empty">No custom notices found</div>';
    return;
  }

  document.getElementById('custom-list').innerHTML = filtered.map(n => {
    const collegeIcon = n.college_type === 'degree' ? '🎓' : n.college_type === 'junior' ? '🏫' : '🎓';
    const catIcons = {admission:'🎓',exam:'📝',event:'📅',fees:'💰',general:'📢',announcement:'📣',holiday:'🎉',result:'🏆'};
    
    return `
      <div class="notice-item ${n.is_pinned ? 'pinned' : ''}">
        <div class="notice-content">
          <div class="notice-title">${n.title}</div>
          <div class="notice-meta">
            <span class="badge badge-custom">${collegeIcon} ${n.college_type}</span>
            <span>${catIcons[n.category] || '📢'} ${n.category}</span>
            ${n.is_pinned ? '<span class="badge badge-pinned">📌 Pinned</span>' : ''}
            <span>${new Date(n.created_at).toLocaleDateString('en-IN')}</span>
          </div>
        </div>
        <div class="notice-actions">
          <button class="btn btn-sm ${n.is_pinned ? 'btn-warning' : 'btn-outline'}" onclick="toggleCustomPin(${n.id}, ${!n.is_pinned})">
            ${n.is_pinned ? '📌 Unpin' : '📌 Pin'}
          </button>
          <button class="btn btn-sm btn-outline" onclick="editCustom(${n.id})">✏️ Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteCustom(${n.id})">🗑️ Delete</button>
        </div>
      </div>
    `;
  }).join('');
}

async function addCustomNotice(e) {
  e.preventDefault();
  
  const notice = {
    title: document.getElementById('add-title').value.trim(),
    category: document.getElementById('add-category').value,
    college_type: document.getElementById('add-college').value,
    link: document.getElementById('add-link').value.trim() || null,
    description: document.getElementById('add-desc').value.trim() || null,
    image_url: document.getElementById('add-image').value.trim() || null,
    is_pinned: document.getElementById('add-pinned').checked,
    is_active: true,
    priority: document.getElementById('add-pinned').checked ? 10 : 0
  };

  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/notices`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(notice)
    });
    
    if (!r.ok) throw new Error('Save failed');
    
    showToast('✅ Notice added!');
    e.target.reset();
    loadCustomNotices();
    switchTab('custom');
    document.querySelectorAll('.tab')[1].click();
  } catch (err) {
    showToast('❌ Failed to add');
    console.error(err);
  }
}

async function toggleCustomPin(id, value) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/notices?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ is_pinned: value, priority: value ? 10 : 0 })
    });
    
    if (!r.ok) throw new Error('Update failed');
    showToast(value ? '📌 Pinned!' : '📌 Unpinned');
    loadCustomNotices();
  } catch (err) {
    showToast('❌ Failed to update');
  }
}

async function deleteCustom(id) {
  if (!confirm('🗑️ Delete this notice?')) return;
  
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/notices?id=eq.${id}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    
    if (!r.ok) throw new Error('Delete failed');
    showToast('🗑️ Deleted!');
    loadCustomNotices();
  } catch (err) {
    showToast('❌ Failed to delete');
  }
}

function editCustom(id) {
  const notice = customNotices.find(n => n.id === id);
  if (!notice) return;
  
  document.getElementById('add-title').value = notice.title;
  document.getElementById('add-category').value = notice.category;
  document.getElementById('add-college').value = notice.college_type;
  document.getElementById('add-link').value = notice.link || '';
  document.getElementById('add-desc').value = notice.description || '';
  document.getElementById('add-image').value = notice.image_url || '';
  document.getElementById('add-pinned').checked = notice.is_pinned;
  
  switchTab('add');
  document.querySelectorAll('.tab')[2].click();
  
  // Change form to edit mode
  const form = document.querySelector('#panel-add form');
  form.onsubmit = async (e) => {
    e.preventDefault();
    const updated = {
      title: document.getElementById('add-title').value.trim(),
      category: document.getElementById('add-category').value,
      college_type: document.getElementById('add-college').value,
      link: document.getElementById('add-link').value.trim() || null,
      description: document.getElementById('add-desc').value.trim() || null,
      image_url: document.getElementById('add-image').value.trim() || null,
      is_pinned: document.getElementById('add-pinned').checked,
      priority: document.getElementById('add-pinned').checked ? 10 : 0
    };
    
    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/notices?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(updated)
      });
      
      if (!r.ok) throw new Error('Update failed');
      showToast('✅ Updated!');
      form.reset();
      form.onsubmit = addCustomNotice;
      loadCustomNotices();
      switchTab('custom');
      document.querySelectorAll('.tab')[1].click();
    } catch (err) {
      showToast('❌ Failed to update');
    }
  };
  
  showToast('✏️ Edit mode - make changes and submit');
}

// ═══════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════
function updateStats() {
  const config = getScrapedConfig();
  document.getElementById('stat-scraped').textContent = scrapedNotices.length;
  document.getElementById('stat-custom').textContent = customNotices.length;
  document.getElementById('stat-pinned').textContent = config.pinned.length + customNotices.filter(n => n.is_pinned).length;
  document.getElementById('stat-hidden').textContent = config.hidden.length;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
refreshScraped();
loadCustomNotices();
</script>
