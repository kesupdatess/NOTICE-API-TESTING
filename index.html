<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KES Notices - Live Feed</title>
    <!-- Using Inter font just like KES website -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --kes-blue: #1e3a8a; /* KES Official Blue */
            --kes-hover: #2563eb;
            --bg: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: #333; 
            padding: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
        }

        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding-bottom: 15px; 
            border-bottom: 2px solid var(--kes-blue);
        }
        .header h1 { 
            color: var(--kes-blue); 
            font-size: 1.8rem; 
            font-weight: 700; 
            margin-bottom: 5px;
        }
        .header p { color: #666; font-size: 0.9rem; }

        /* EXACT KES LIST STYLE */
        .kes-list { list-style: none; }
        
        .kes-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }
        
        .kes-item:last-child { border-bottom: none; }
        
        .kes-date {
            font-size: 0.8rem;
            color: #666;
            min-width: 110px;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .kes-title a {
            color: var(--kes-blue);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.4;
            transition: color 0.2s;
        }
        
        .kes-title a:hover {
            color: var(--kes-hover);
            text-decoration: underline;
        }

        .loading { text-align: center; padding: 40px; color: #666; }
        .error { 
            background: #fee2e2; 
            color: #991b1b; 
            padding: 15px; 
            border-radius: 6px; 
            text-align: center; 
            margin-top: 20px;
        }
        .refresh-btn { 
            margin-top: 10px; 
            padding: 6px 14px; 
            background: var(--kes-blue); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>NOTICES</h1>
        <p>Live updates from KES' Shroff College</p>
    </div>

    <ul id="notices-container" class="kes-list">
        <li class="loading">Fetching latest notices...</li>
    </ul>

    <script>
        const KES_NOTICES_PAGE = 'https://kessc.edu.in/notices/';
        const PROXY = 'https://corsproxy.io/?';

        async function loadNotices() {
            const container = document.getElementById('notices-container');
            
            try {
                const response = await fetch(PROXY + encodeURIComponent(KES_NOTICES_PAGE));
                if (!response.ok) throw new Error('Network error');
                
                const htmlText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                // Targeting WordPress Latest Posts Block exactly as KES uses it
                let items = Array.from(doc.querySelectorAll('.wp-block-latest-posts__list li'));
                
                // Fallback if block class changes
                if (items.length === 0) {
                    items = Array.from(doc.querySelectorAll('article.post, .post-title')).slice(0, 15);
                }

                if (items.length === 0) throw new Error('No notices found');

                container.innerHTML = items.slice(0, 15).map(item => {
                    // Extract Date
                    const dateEl = item.querySelector('.wp-block-latest-posts__post-date, time, .date');
                    let date = '';
                    if (dateEl) {
                        const raw = dateEl.textContent.trim();
                        const parsed = new Date(raw);
                        date = !isNaN(parsed.getTime()) ? 
                            parsed.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : 
                            raw;
                    }

                    // Extract Title & Link
                    const linkEl = item.querySelector('a');
                    const title = linkEl ? linkEl.textContent.trim() : item.textContent.trim();
                    const href = linkEl ? linkEl.href : '#';

                    // Skip empty or generic items
                    if (!title || title.toLowerCase() === 'notices') return '';

                    return `
                        <li class="kes-item">
                            <span class="kes-date">${date}</span>
                            <div class="kes-title"><a href="${href}" target="_blank">${title}</a></div>
                        </li>
                    `;
                }).filter(i => i !== '').join('');

            } catch (err) {
                console.error(err);
                container.innerHTML = `<li class="error">Unable to load notices.<br><button class="refresh-btn" onclick="loadNotices()">Retry</button></li>`;
            }
        }

        loadNotices();
        setInterval(loadNotices, 300000);
    </script>
</body>
</html>
