<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KES Notices - Live Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --kes-blue: #1e3a8a; 
            --kes-hover: #2563eb;
            --bg: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: #333; 
            padding: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
        }

        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding-bottom: 15px; 
            border-bottom: 2px solid var(--kes-blue);
        }
        .header h1 { 
            color: var(--kes-blue); 
            font-size: 1.8rem; 
            font-weight: 700; 
            margin-bottom: 5px;
        }
        .header p { color: #666; font-size: 0.9rem; }

        .kes-list { list-style: none; }
        
        .kes-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }
        
        .kes-item:last-child { border-bottom: none; }
        
        .kes-date {
            font-size: 0.8rem;
            color: #666;
            min-width: 110px;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .kes-title a {
            color: var(--kes-blue);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.4;
            transition: color 0.2s;
        }
        
        .kes-title a:hover {
            color: var(--kes-hover);
            text-decoration: underline;
        }

        .loading { text-align: center; padding: 40px; color: #666; list-style: none; }
        .error { 
            background: #fee2e2; 
            color: #991b1b; 
            padding: 15px; 
            border-radius: 6px; 
            text-align: center; 
            margin-top: 20px;
            list-style: none;
        }
        .refresh-btn { 
            margin-top: 10px; 
            padding: 6px 14px; 
            background: var(--kes-blue); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>NOTICES</h1>
        <p>Live updates from KES' Shroff College</p>
    </div>

    <ul id="notices-container" class="kes-list">
        <li class="loading">Fetching latest notices...</li>
    </ul>

    <script>
        const KES_NOTICES_PAGE = 'https://kessc.edu.in/notices/';
        
        // Multiple Proxies - Agar ek fail ho toh dusra try karega
        const PROXIES = [
            'https://corsproxy.io/?',
            'https://api.allorigins.win/get?url=',
            'https://api.codetabs.com/v1/proxy?quest='
        ];

        async function loadNotices() {
            const container = document.getElementById('notices-container');
            container.innerHTML = '<li class="loading">Fetching latest notices...</li>';

            for (const proxy of PROXIES) {
                try {
                    let response;
                    let htmlText;

                    // AllOrigins ka format alag hota hai
                    if (proxy.includes('allorigins')) {
                        response = await fetch(proxy + encodeURIComponent(KES_NOTICES_PAGE));
                        const data = await response.json();
                        htmlText = data.contents;
                    } else {
                        response = await fetch(proxy + encodeURIComponent(KES_NOTICES_PAGE));
                        htmlText = await response.text();
                    }

                    if (!response.ok || !htmlText) continue;

                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');
                    
                    // Multiple Selectors Try Karo
                    let items = Array.from(doc.querySelectorAll('.wp-block-latest-posts__list li'));
                    
                    if (items.length === 0) {
                        items = Array.from(doc.querySelectorAll('article.post h2 a, .entry-title a, .post-title a'));
                    }

                    if (items.length === 0) {
                        // Last Resort: Koi bhi link jo "Notice" ya "Roll Call" contain karta ho
                        items = Array.from(doc.querySelectorAll('a')).filter(a => {
                            const t = a.textContent.trim().toLowerCase();
                            return (t.includes('notice') || t.includes('roll call') || t.includes('result')) && t.length > 15;
                        }).slice(0, 15);
                    }

                    if (items.length === 0) continue; // Next proxy try karo

                    // Render Exact KES Style
                    container.innerHTML = items.slice(0, 15).map(item => {
                        const linkEl = item.querySelector('a') || item;
                        const title = linkEl.textContent.trim();
                        const href = linkEl.href || '#';
                        
                        // Date Extract
                        let date = '';
                        const parent = item.closest('li') || item;
                        const dateEl = parent.querySelector('.wp-block-latest-posts__post-date, time, .date, span.date');
                        if (dateEl) {
                            const raw = dateEl.textContent.trim();
                            const parsed = new Date(raw);
                            date = !isNaN(parsed.getTime()) ? 
                                parsed.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : 
                                raw;
                        }

                        if (!title || title.toLowerCase() === 'notices') return '';

                        return `
                            <li class="kes-item">
                                <span class="kes-date">${date}</span>
                                <div class="kes-title"><a href="${href}" target="_blank">${title}</a></div>
                            </li>
                        `;
                    }).filter(i => i !== '').join('');

                    return; // Success! Stop trying other proxies

                } catch (err) {
                    console.warn(`Proxy failed: ${proxy}`, err.message);
                    continue;
                }
            }

            // Agar saare proxies fail ho jayein
            container.innerHTML = `<li class="error">Unable to load notices.<br><button class="refresh-btn" onclick="loadNotices()">Retry</button></li>`;
        }

        loadNotices();
        setInterval(loadNotices, 300000);
    </script>
</body>
</html>
